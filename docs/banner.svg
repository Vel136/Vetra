<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#06090f"/>
      <stop offset="50%"  stop-color="#090d16"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#131d2e" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="a1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4f9cf8" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#4f9cf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4f9cf8" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="a2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4f9cf8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4f9cf8" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="a3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4f9cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4f9cf8" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur7"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="blur12"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)" opacity="0.7"/>

  <!-- Left side soft radial warmth behind trajectory -->
  <ellipse cx="320" cy="220" rx="340" ry="220" fill="#0d1929" opacity="0.5"/>

  <!-- Ground line -->
  <line x1="40" y1="300" x2="620" y2="300" stroke="#16253a" stroke-width="1.5"/>
  <!-- Ground shadow -->
  <line x1="40" y1="301" x2="620" y2="301" stroke="#0d1929" stroke-width="3" opacity="0.6"/>

  <!-- Thin wall (pierce target) -->
  <rect x="394" y="148" width="9" height="152" rx="1" fill="#16253a"/>
  <rect x="394" y="148" width="2" height="152" fill="#1e3550" opacity="0.9"/>
  <rect x="401" y="148" width="2" height="152" fill="#0d1929" opacity="0.6"/>
  <!-- Pierce hole -->
  <rect x="393" y="228" width="11" height="5" rx="1" fill="#06090f"/>
  <!-- Wall top cap -->
  <rect x="392" y="146" width="13" height="3" rx="1" fill="#1e3550" opacity="0.7"/>

  <!-- === ARC 1: launch to wall === -->
  <!-- outer glow -->
  <path d="M 78,270 Q 235,52 393,230"
        fill="none" stroke="#4f9cf8" stroke-width="10" stroke-linecap="round"
        opacity="0.06" filter="url(#blur4)"/>
  <!-- mid glow -->
  <path d="M 78,270 Q 235,52 393,230"
        fill="none" stroke="#4f9cf8" stroke-width="4" stroke-linecap="round"
        opacity="0.2" filter="url(#blur4)"/>
  <!-- crisp line -->
  <path d="M 78,270 Q 235,52 393,230"
        fill="none" stroke="url(#a1)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- === ARC 2: pierce exit to bounce === -->
  <path d="M 403,233 Q 492,182 547,300"
        fill="none" stroke="#4f9cf8" stroke-width="8" stroke-linecap="round"
        opacity="0.07" filter="url(#blur4)"/>
  <path d="M 403,233 Q 492,182 547,300"
        fill="none" stroke="#4f9cf8" stroke-width="3" stroke-linecap="round"
        opacity="0.18" filter="url(#blur4)"/>
  <path d="M 403,233 Q 492,182 547,300"
        fill="none" stroke="url(#a2)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- === ARC 3: decay bounce === -->
  <path d="M 547,300 Q 592,262 636,300"
        fill="none" stroke="#4f9cf8" stroke-width="6" stroke-linecap="round"
        opacity="0.05" filter="url(#blur4)"/>
  <path d="M 547,300 Q 592,262 636,300"
        fill="none" stroke="url(#a3)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Muzzle origin -->
  <circle cx="78" cy="270" r="18" fill="#4f9cf8" opacity="0.07" filter="url(#blur7)"/>
  <circle cx="78" cy="270" r="5"  fill="#4f9cf8" opacity="0.9"/>
  <circle cx="78" cy="270" r="2.5" fill="#cce8ff"/>
  <!-- Crosshair ticks -->
  <line x1="66" y1="270" x2="73" y2="270" stroke="#4f9cf8" stroke-width="1" opacity="0.45"/>
  <line x1="78" y1="258" x2="78" y2="265" stroke="#4f9cf8" stroke-width="1" opacity="0.45"/>
  <!-- Velocity arrow -->
  <line x1="78" y1="270" x2="113" y2="253" stroke="#6eb5ff" stroke-width="1.3" opacity="0.6" stroke-linecap="round"/>
  <polygon points="116,251 106,248 110,259" fill="#6eb5ff" opacity="0.6"/>

  <!-- Active bullet at apex -->
  <circle cx="235" cy="74" r="16" fill="#4f9cf8" opacity="0.09" filter="url(#blur7)"/>
  <circle cx="235" cy="74" r="5"  fill="#7dcaff"/>
  <circle cx="235" cy="74" r="2.2" fill="#ffffff" opacity="0.92"/>
  <line x1="235" y1="74" x2="268" y2="90" stroke="#7dcaff" stroke-width="1.4" opacity="0.7" stroke-linecap="round"/>
  <polygon points="271,92 261,84 267,96" fill="#7dcaff" opacity="0.7"/>

  <!-- Pierce entry glow -->
  <circle cx="399" cy="231" r="11" fill="#4f9cf8" opacity="0.18" filter="url(#blur4)"/>
  <circle cx="399" cy="231" r="4"  fill="#4f9cf8" opacity="0.85"/>
  <circle cx="399" cy="231" r="1.8" fill="#b8dbff"/>
  <!-- Spark marks -->
  <line x1="406" y1="225" x2="416" y2="218" stroke="#4f9cf8" stroke-width="0.9" opacity="0.45" stroke-linecap="round"/>
  <line x1="407" y1="231" x2="419" y2="230" stroke="#4f9cf8" stroke-width="0.9" opacity="0.38" stroke-linecap="round"/>
  <line x1="405" y1="237" x2="415" y2="243" stroke="#4f9cf8" stroke-width="0.9" opacity="0.45" stroke-linecap="round"/>

  <!-- Bounce contact point -->
  <circle cx="547" cy="300" r="11" fill="#4f9cf8" opacity="0.1" filter="url(#blur4)"/>
  <circle cx="547" cy="300" r="4"  fill="#4f9cf8" opacity="0.72"/>
  <circle cx="547" cy="300" r="1.8" fill="#b8dbff" opacity="0.85"/>
  <!-- Surface normal -->
  <line x1="547" y1="300" x2="547" y2="256" stroke="#e8b840" stroke-width="1" stroke-dasharray="3,2.5" opacity="0.5"/>
  <polygon points="547,250 543,261 551,261" fill="#e8b840" opacity="0.5"/>

  <!-- Final tiny bounce dot -->
  <circle cx="636" cy="300" r="7" fill="#4f9cf8" opacity="0.07" filter="url(#blur4)"/>
  <circle cx="636" cy="300" r="2.8" fill="#4f9cf8" opacity="0.42"/>

  <!-- Ground tick marks -->
  <line x1="160" y1="297" x2="160" y2="303" stroke="#16253a" stroke-width="1"/>
  <line x1="240" y1="297" x2="240" y2="303" stroke="#16253a" stroke-width="1"/>
  <line x1="320" y1="297" x2="320" y2="303" stroke="#16253a" stroke-width="1"/>
  <line x1="440" y1="297" x2="440" y2="303" stroke="#16253a" stroke-width="1"/>
  <line x1="490" y1="297" x2="490" y2="303" stroke="#16253a" stroke-width="1"/>
  <line x1="590" y1="297" x2="590" y2="303" stroke="#16253a" stroke-width="1"/>

  <!-- Vertical divider -->
  <line x1="672" y1="36" x2="672" y2="364" stroke="#16253a" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- ===== TEXT SECTION ===== -->

  <!-- "VETRA" glow layer -->
  <text x="936" y="190"
        text-anchor="middle"
        font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="100" font-weight="700" letter-spacing="-4"
        fill="#4f9cf8" opacity="0.12" filter="url(#blur12)">VETRA</text>

  <!-- "VETRA" main -->
  <text x="936" y="190"
        text-anchor="middle"
        font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="100" font-weight="700" letter-spacing="-4"
        fill="#dde8f4">VETRA</text>

  <!-- Tagline -->
  <text x="936" y="230"
        text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="14.5" font-weight="400" letter-spacing="0.7"
        fill="#506070">Every shot lands where physics says it should.</text>

  <!-- Divider -->
  <line x1="730" y1="252" x2="1142" y2="252" stroke="#16253a" stroke-width="1"/>

  <!-- Formula -->
  <text x="936" y="280"
        text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
        font-size="12.5" letter-spacing="0.4"
        fill="#243650">P(t) = Origin + V₀t + ½At²</text>

  <!-- Feature chips -->
  <!-- Pierce -->
  <rect x="718" y="304" width="58" height="21" rx="10.5" fill="#0b1624" stroke="#1b3050" stroke-width="1"/>
  <text x="747" y="319" text-anchor="middle"
        font-family="'Inter', sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.2" fill="#4f9cf8">Pierce</text>

  <!-- Bounce -->
  <rect x="784" y="304" width="62" height="21" rx="10.5" fill="#0b1624" stroke="#1b3050" stroke-width="1"/>
  <text x="815" y="319" text-anchor="middle"
        font-family="'Inter', sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.2" fill="#4f9cf8">Bounce</text>

  <!-- Drag -->
  <rect x="854" y="304" width="50" height="21" rx="10.5" fill="#0b1624" stroke="#1b3050" stroke-width="1"/>
  <text x="879" y="319" text-anchor="middle"
        font-family="'Inter', sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.2" fill="#4f9cf8">Drag</text>

  <!-- Homing -->
  <rect x="912" y="304" width="64" height="21" rx="10.5" fill="#0b1624" stroke="#1b3050" stroke-width="1"/>
  <text x="944" y="319" text-anchor="middle"
        font-family="'Inter', sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.2" fill="#4f9cf8">Homing</text>

  <!-- VetraNet -->
  <rect x="984" y="304" width="74" height="21" rx="10.5" fill="#0b1624" stroke="#1b3050" stroke-width="1"/>
  <text x="1021" y="319" text-anchor="middle"
        font-family="'Inter', sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.2" fill="#4f9cf8">VetraNet</text>

  <!-- Parallel -->
  <rect x="1066" y="304" width="70" height="21" rx="10.5" fill="#0b1624" stroke="#1b3050" stroke-width="1"/>
  <text x="1101" y="319" text-anchor="middle"
        font-family="'Inter', sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.2" fill="#4f9cf8">Parallel</text>

  <!-- Version / meta line -->
  <text x="936" y="360"
        text-anchor="middle"
        font-family="'JetBrains Mono', monospace"
        font-size="10.5" letter-spacing="1.2"
        fill="#1e3050">v6.4.1  ·  MIT  ·  Roblox</text>

  <!-- Corner brackets -->
  <polyline points="0,52 0,0 52,0"   fill="none" stroke="#1a2d45" stroke-width="1.5" stroke-linecap="square"/>
  <polyline points="1148,0 1200,0 1200,52" fill="none" stroke="#1a2d45" stroke-width="1.5" stroke-linecap="square"/>
  <polyline points="0,348 0,400 52,400" fill="none" stroke="#1a2d45" stroke-width="1.5" stroke-linecap="square"/>
  <polyline points="1148,400 1200,400 1200,348" fill="none" stroke="#1a2d45" stroke-width="1.5" stroke-linecap="square"/>
</svg>