<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0d13;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0d13;stop-opacity:1" />
    </linearGradient>

    <!-- Arc glow filter -->
    <filter id="arcGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft glow for points -->
    <filter id="pointGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a2030" stroke-width="0.75"/>
    </pattern>

    <!-- Arc trail gradient (fades in from left) -->
    <linearGradient id="arcFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4d9ef7;stop-opacity:0" />
      <stop offset="15%" style="stop-color:#4d9ef7;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#4d9ef7;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="arcFade2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4d9ef7;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4d9ef7;stop-opacity:0.5" />
    </linearGradient>

    <linearGradient id="arcFade3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4d9ef7;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#4d9ef7;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Grid overlay -->
  <rect width="1200" height="400" fill="url(#grid)" opacity="0.5" />

  <!-- Floor surface line -->
  <line x1="0" y1="320" x2="1200" y2="320" stroke="#1e2d40" stroke-width="1.5" />

  <!-- ── Arc 1: Initial trajectory (muzzle to first bounce) ───────────────── -->
  <!-- Parabola from (100, 260) firing right and down to floor at (420, 320) -->
  <!-- Glow layer -->
  <path d="M 100,260 Q 260,80 420,320"
        fill="none"
        stroke="#4d9ef7"
        stroke-width="5"
        stroke-linecap="round"
        opacity="0.25"
        filter="url(#arcGlow)" />
  <!-- Main line -->
  <path d="M 100,260 Q 260,80 420,320"
        fill="none"
        stroke="url(#arcFade)"
        stroke-width="2"
        stroke-linecap="round"
        filter="url(#arcGlow)" />

  <!-- ── Arc 2: First bounce to second bounce ─────────────────────────────── -->
  <!-- Reflected arc from (420, 320) up and to (700, 320) -->
  <path d="M 420,320 Q 560,155 700,320"
        fill="none"
        stroke="#4d9ef7"
        stroke-width="5"
        stroke-linecap="round"
        opacity="0.2"
        filter="url(#arcGlow)" />
  <path d="M 420,320 Q 560,155 700,320"
        fill="none"
        stroke="url(#arcFade2)"
        stroke-width="2"
        stroke-linecap="round"
        filter="url(#arcGlow)" />

  <!-- ── Arc 3: Second bounce (shorter, decaying energy) ──────────────────── -->
  <path d="M 700,320 Q 800,220 900,320"
        fill="none"
        stroke="#4d9ef7"
        stroke-width="5"
        stroke-linecap="round"
        opacity="0.15"
        filter="url(#arcGlow)" />
  <path d="M 700,320 Q 800,220 900,320"
        fill="none"
        stroke="url(#arcFade3)"
        stroke-width="2"
        stroke-linecap="round"
        filter="url(#arcGlow)" />

  <!-- ── Bounce normal indicators ─────────────────────────────────────────── -->
  <!-- Normal at first bounce (420, 320) — vertical arrow upward -->
  <line x1="420" y1="320" x2="420" y2="258"
        stroke="#f0c040" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7" />
  <polygon points="420,252 415,264 425,264"
           fill="#f0c040" opacity="0.7" />
  <!-- Normal label -->
  <text x="428" y="268" fill="#f0c040" font-family="'JetBrains Mono', monospace" font-size="10" opacity="0.6">N</text>

  <!-- Normal at second bounce (700, 320) -->
  <line x1="700" y1="320" x2="700" y2="268"
        stroke="#f0c040" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.55" />
  <polygon points="700,262 695,274 705,274"
           fill="#f0c040" opacity="0.55" />
  <text x="708" y="272" fill="#f0c040" font-family="'JetBrains Mono', monospace" font-size="10" opacity="0.5">N</text>

  <!-- ── Bounce contact points ─────────────────────────────────────────────── -->
  <!-- First bounce -->
  <circle cx="420" cy="320" r="10" fill="#4d9ef7" opacity="0.12" filter="url(#pointGlow)" />
  <circle cx="420" cy="320" r="4" fill="#4d9ef7" opacity="0.9" />
  <circle cx="420" cy="320" r="2" fill="#a8d4ff" />

  <!-- Second bounce -->
  <circle cx="700" cy="320" r="9" fill="#4d9ef7" opacity="0.1" filter="url(#pointGlow)" />
  <circle cx="700" cy="320" r="3.5" fill="#4d9ef7" opacity="0.75" />
  <circle cx="700" cy="320" r="1.8" fill="#a8d4ff" />

  <!-- Third bounce -->
  <circle cx="900" cy="320" r="7" fill="#4d9ef7" opacity="0.08" filter="url(#pointGlow)" />
  <circle cx="900" cy="320" r="3" fill="#4d9ef7" opacity="0.5" />
  <circle cx="900" cy="320" r="1.5" fill="#a8d4ff" opacity="0.6" />

  <!-- ── Muzzle / origin point ─────────────────────────────────────────────── -->
  <circle cx="100" cy="260" r="14" fill="#4d9ef7" opacity="0.15" filter="url(#pointGlow)" />
  <circle cx="100" cy="260" r="5" fill="#4d9ef7" />
  <circle cx="100" cy="260" r="2.5" fill="#e8f4ff" />

  <!-- Small crosshair at origin -->
  <line x1="90" y1="260" x2="100" y2="260" stroke="#4d9ef7" stroke-width="1" opacity="0.5" />
  <line x1="100" y1="250" x2="100" y2="260" stroke="#4d9ef7" stroke-width="1" opacity="0.5" />

  <!-- ── Bullet tip (moving along arc 1, near the apex) ────────────────────── -->
  <circle cx="260" cy="100" r="12" fill="#4d9ef7" opacity="0.18" filter="url(#pointGlow)" />
  <circle cx="260" cy="100" r="4.5" fill="#7ec8ff" />
  <circle cx="260" cy="100" r="2" fill="#ffffff" opacity="0.9" />
  <!-- Velocity arrow at bullet -->
  <line x1="260" y1="100" x2="295" y2="118"
        stroke="#7ec8ff" stroke-width="1.5" stroke-linecap="round" opacity="0.7" />
  <polygon points="298,120 286,112 293,125"
           fill="#7ec8ff" opacity="0.7" />

  <!-- ── Subtle segment markers (tick marks along floor) ───────────────────── -->
  <line x1="240" y1="317" x2="240" y2="323" stroke="#1e2d40" stroke-width="1" />
  <line x1="300" y1="317" x2="300" y2="323" stroke="#1e2d40" stroke-width="1" />
  <line x1="360" y1="317" x2="360" y2="323" stroke="#1e2d40" stroke-width="1" />
  <line x1="480" y1="317" x2="480" y2="323" stroke="#1e2d40" stroke-width="1" />
  <line x1="540" y1="317" x2="540" y2="323" stroke="#1e2d40" stroke-width="1" />
  <line x1="600" y1="317" x2="600" y2="323" stroke="#1e2d40" stroke-width="1" />
  <line x1="660" y1="317" x2="660" y2="323" stroke="#1e2d40" stroke-width="1" />
  <line x1="760" y1="317" x2="760" y2="323" stroke="#1e2d40" stroke-width="1" />
  <line x1="820" y1="317" x2="820" y2="323" stroke="#1e2d40" stroke-width="1" />
  <line x1="860" y1="317" x2="860" y2="323" stroke="#1e2d40" stroke-width="1" />

  <!-- ── Title text ─────────────────────────────────────────────────────────── -->
  <!-- Glow pass -->
  <text x="600" y="185"
        text-anchor="middle"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="64"
        font-weight="700"
        letter-spacing="-2"
        fill="#4d9ef7"
        opacity="0.18"
        filter="url(#textGlow)">HybridSolver</text>
  <!-- Main text -->
  <text x="600" y="185"
        text-anchor="middle"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="64"
        font-weight="700"
        letter-spacing="-2"
        fill="#e6edf3">Hybrid<tspan fill="#4d9ef7">Solver</tspan></text>

  <!-- Tagline -->
  <text x="600" y="220"
        text-anchor="middle"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="16"
        font-weight="400"
        letter-spacing="0.5"
        fill="#8b949e">Analytic-trajectory projectile simulation for Roblox</text>

  <!-- ── Small formula label (subtle) ─────────────────────────────────────── -->
  <text x="600" y="292"
        text-anchor="middle"
        font-family="'JetBrains Mono', monospace"
        font-size="12"
        fill="#30363d"
        letter-spacing="1">P(t) = Origin + V₀t + ½At²</text>

  <!-- ── Corner decoration lines ───────────────────────────────────────────── -->
  <line x1="0" y1="0" x2="40" y2="0" stroke="#1e2d40" stroke-width="1.5" />
  <line x1="0" y1="0" x2="0" y2="40" stroke="#1e2d40" stroke-width="1.5" />
  <line x1="1200" y1="0" x2="1160" y2="0" stroke="#1e2d40" stroke-width="1.5" />
  <line x1="1200" y1="0" x2="1200" y2="40" stroke="#1e2d40" stroke-width="1.5" />
  <line x1="0" y1="400" x2="40" y2="400" stroke="#1e2d40" stroke-width="1.5" />
  <line x1="0" y1="400" x2="0" y2="360" stroke="#1e2d40" stroke-width="1.5" />
  <line x1="1200" y1="400" x2="1160" y2="400" stroke="#1e2d40" stroke-width="1.5" />
  <line x1="1200" y1="400" x2="1200" y2="360" stroke="#1e2d40" stroke-width="1.5" />
</svg>